<!DOCTYPE html>
<html>
<head>
  <title>Account Verification Demo</title>
</head>
<body>
  <h1>Urgent Account Verification</h1>
  <p>Please verify your account and confirm your password.</p>

  <form>
    <label>Email</label>
    <input type="email" name="email">

    <label>Password</label>
    <input type="password" name="password">

    <button type="button">Verify Account</button>
  </form>
</body>
</html>
